<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline'; img-src * data:;"
    />
    <title>Scoreko - Novedades</title>
    <style>
      body {
        background-color: #121212;
        color: #f5f5f5;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        overflow-y: auto;
        padding: 32px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        border-bottom: 1px solid #333;
        padding-bottom: 16px;
      }
      .logo {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
      }
      h1 {
        margin: 0;
        color: #ff7f00;
        font-size: 1.5rem;
      }
      .content {
        line-height: 1.6;
      }
      .content a {
        color: #ff7f00;
      }
      .content h1,
      .content h2,
      .content h3 {
        color: #fff;
      }
      .content code {
        background-color: #222;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .content pre {
        background-color: #222;
        padding: 12px;
        border-radius: 8px;
        overflow-x: auto;
      }
      .content blockquote {
        border-left: 4px solid #ff7f00;
        margin: 0;
        padding-left: 16px;
        color: #ccc;
      }
      .footer {
        margin-top: 32px;
        text-align: right;
      }
      .btn {
        background-color: #ff7f00;
        color: #121212;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
      }
      .btn:hover {
        background-color: #ff9933;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #121212;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="icons/icon.png" class="logo" alt="Scoreko Logo" />
      <h1>Scoreko se ha actualizado</h1>
    </div>
    <div class="content" id="changelogContent">Cargando...</div>
    <div class="footer">
      <button class="btn" id="closeBtn">Cerrar</button>
    </div>
    <script src="lib/purify.min.js"></script>
    <script>
      document.getElementById("closeBtn").addEventListener("click", () => {
        window.close();
      });

      window.electronAPI.onChangelog((html) => {
        const contentDiv = document.getElementById("changelogContent");
        if (contentDiv) {
          contentDiv.innerHTML = DOMPurify.sanitize(html);
        }
      });
    </script>
  </body>
</html>
